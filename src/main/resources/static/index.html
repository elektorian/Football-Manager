<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">

  <div class="sidebar">
    <div class="sidebar-header">
      <button id="backBtn" class="back-btn" onclick="goBack()" disabled>← Назад</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#profile" class="nav-item" data-tab="profile">Профиль</a>
      <a href="#inbox" class="nav-item" data-tab="inbox">Входящие</a>
      <a href="#squad" class="nav-item" data-tab="squad">Состав</a>
      <a href="#tactics" class="nav-item" data-tab="tactics">Тактика</a>
      <a href="#tournaments" class="nav-item" data-tab="tournaments">Турниры</a>
      <a href="#schedule" class="nav-item" data-tab="schedule">Расписание</a>
      <a href="#club" class="nav-item" data-tab="club">Клуб</a>
    </nav>
  </div>

  <div class="right-panel">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle"></div>
      <div class="topbar-right">
        <div class="js-menu" style="position: relative;">
          <button class="topbar-btn" onclick="toggleMenu()">☰</button>
          <div class="dropdown-menu" id="menuBody">
            <button class="dropdown-item">💾 Сохранить</button>
            <button class="dropdown-item">📂 Загрузить</button>
          </div>
        </div>
        <button class="topbar-date js-calendar" onclick="toggleCalendar()">
          <span>📅</span>
          <span id="currentDate">15.06.2026</span>
        </button>
        <div style="position: relative;">
          <div class="calendar-popup" id="calendarBody">
            <div class="calendar-header">
              <button>◀</button>
              <span id="currentMonth">Июнь 2026</span>
              <button>▶</button>
            </div>
            <div class="calendar-grid" id="calendarDays"></div>
          </div>
        </div>
        <button class="topbar-btn primary" onclick="advanceDay()">Далее ▸</button>
      </div>
    </div>

    <div class="content-area">
      <section id="page-profile" class="page-content">
        <h1 class="page-title">Профиль</h1>
        <div class="profile-card" id="profileCard">
          <div class="profile-field">
            <span class="profile-label">Имя</span>
            <span class="profile-value" id="profileFirstName">—</span>
          </div>
          <div class="profile-field">
            <span class="profile-label">Фамилия</span>
            <span class="profile-value" id="profileLastName">—</span>
          </div>
          <div class="profile-field">
            <span class="profile-label">Дата рождения</span>
            <span class="profile-value" id="profileBirthDate">—</span>
          </div>
        </div>
      </section>
      <section id="page-inbox" class="page-content">
        <h1 class="page-title">Входящие</h1>
        <div class="inbox-layout">
          <div class="inbox-list" id="inboxList"></div>
          <div class="inbox-content" id="inboxContent">
            <p class="inbox-empty">Нет уведомлений</p>
          </div>
        </div>
      </section>
      <section id="page-squad" class="page-content">
        <h1 class="page-title">Состав</h1>
        <p>Список игроков команды.</p>
      </section>
      <section id="page-tactics" class="page-content">
        <h1 class="page-title">Тактика</h1>
        <p>Расстановка и тактические настройки.</p>
      </section>
      <section id="page-tournaments" class="page-content">
        <h1 class="page-title">Турниры</h1>
        <div id="tournamentSections"></div>
      </section>
      <section id="page-tournament" class="page-content">
        <div class="tab-bar">
          <button class="tab active" data-tab="table" onclick="switchTournamentTab('table')">Таблица</button>
          <button class="tab" data-tab="rounds" onclick="switchTournamentTab('rounds')">Туры</button>
        </div>
        <div id="tournamentTableFull"></div>
        <div id="tournamentRounds" style="display:none">
          <div class="round-nav">
            <button class="round-nav-btn" onclick="prevRound()" id="prevRoundBtn">←</button>
            <input type="number" class="round-nav-input" id="roundNumberInput" value="1" min="1" onchange="jumpToRound(this.value)">
            <span id="roundTotal" class="round-nav-total">из 0</span>
            <button class="round-nav-btn" onclick="nextRound()" id="nextRoundBtn">→</button>
          </div>
          <div id="roundMatchesContainer"></div>
        </div>
      </section>
      <section id="page-schedule" class="page-content">
        <h1 class="page-title">Расписание</h1>
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Матч</th>
              <th>Дата</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </section>
      <section id="page-club" class="page-content">
        <div class="club-header">
          <div class="club-header-left">
            <h1 class="club-name" id="clubName"></h1>
            <span class="club-country" id="clubCountry"></span>
          </div>
          <div class="club-header-right">
            <div class="club-geo">
              <span id="clubCity"></span>
            </div>
          </div>
        </div>

        <div class="tab-bar">
          <button class="tab active" data-tab="info" onclick="switchClubTab('info')">Информация</button>
          <button class="tab" data-tab="squad" onclick="switchClubTab('squad')">Состав</button>
          <button class="tab" data-tab="matches" onclick="switchClubTab('matches')">Матчи</button>
        </div>

        <div id="clubTabInfo" class="club-tab-content"></div>
        <div id="clubTabSquad" class="club-tab-content" style="display:none;">
          <div id="clubSquadList"></div>
        </div>
        <div id="clubTabMatches" class="club-tab-content" style="display:none;">
          <table class="schedule-table">
            <thead>
              <tr>
                <th>Матч</th>
                <th>Дата</th>
              </tr>
            </thead>
            <tbody id="clubScheduleBody"></tbody>
          </table>
        </div>
      </section>
      <section id="page-player" class="page-content"></section>
      <section id="page-team" class="page-content"></section>
      <section id="page-tournament-detail" class="page-content"></section>
    </div>
  </div>

</div>
<script src="/js/app.js"></script>
</body>
</html>
