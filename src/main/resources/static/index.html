<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Calendar</title>
    <style>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        #ui-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar Styles */
        #sidebar { width: 220px; background-color: #111; border-right: 1px solid #333; display: flex; flex-direction: column; padding-top: 20px; }
        .nav-item { padding: 12px 20px; cursor: pointer; font-size: 0.95rem; color: #aaa; transition: all 0.2s; border-left: 4px solid transparent; }
        .nav-item:hover { background-color: #222; color: white; }
        .nav-item.active { background-color: #2a2a2a; color: white; border-left: 4px solid #4CAF50; font-weight: bold; }

        /* Main Content Area */
        #main-content { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; }
        
        #main-viewport { text-align: center; font-size: 1.5rem; color: #888; border: 2px dashed #444; padding: 40px; border-radius: 15px; background: #2a2a2a; min-width: 600px; max-width: 90%; }
        
        #top-right-menu { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }

        /* Table Styles */
        .game-table { width: 100%; border-collapse: collapse; margin: 20px 0; color: white; font-size: 0.9rem; }
        .game-table th, .game-table td { padding: 8px; text-align: left; border-bottom: 1px solid #444; }
        .game-table th { background-color: #333; color: #aaa; font-weight: normal; }
        .link-text { color: #4CAF50; cursor: pointer; text-decoration: underline; }
        .link-text:hover { color: #66bb6a; }

        /* Matches list styles */
        .round-section { margin-bottom: 30px; text-align: left; }
        .round-title { font-size: 1.2rem; color: #4CAF50; border-bottom: 1px solid #4CAF50; padding-bottom: 5px; margin-bottom: 10px; }
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #333; margin-bottom: 4px; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .match-row:hover { background: #444; }
        .match-teams { display: flex; gap: 15px; align-items: center; width: 70%; justify-content: center; }
        .score-box { background: #1a1a1a; padding: 2px 8px; border-radius: 3px; font-weight: bold; color: #fff; min-width: 40px; text-align: center; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 8px 16px; background: #333; color: #aaa; border: none; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #4CAF50; color: white; }


        
        button { padding: 10px 20px; cursor: pointer; font-size: 0.9rem; border: none; border-radius: 5px; transition: background 0.2s; }
        .btn-next { background-color: #4CAF50; color: white; font-weight: bold; }
        .btn-next:hover { background-color: #45a049; }
        
        #date-display { 
            background-color: #333; color: #eee; border: 1px solid #555; padding: 10px 15px; 
            cursor: pointer; font-weight: bold; border-radius: 5px; min-width: 120px; text-align: center;
        }
        #date-display:hover { background-color: #444; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background-color: #2196F3; color: white; }
        .dropbtn:hover { background-color: #1e88e5; }
        
        .dropdown-content { 
            display: none; position: absolute; right: 0; background-color: #333; min-width: 200px; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1; border-radius: 5px; padding: 10px 0; 
        }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; }
        .dropdown-content a:hover { background-color: #444; }
        .dropdown:hover .dropdown-content { display: block; }

        /* Basic Modal for Calendar */
        #calendar-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #2a2a2a; border: 1px solid #555; padding: 20px; border-radius: 10px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 200; min-width: 300px;
        }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 150; }
        .close-modal { float: right; cursor: pointer; color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body onclick="closeModal(event)">

<div id="ui-container">
<div id="sidebar">
    <div class="nav-item active" onclick="switchPage('my_page')">Моя страница</div>
    <div class="nav-item" onclick="switchPage('tournaments')">Турниры</div>
</div>

    <div id="main-content">
        <div id="main-viewport">Main Game View (Empty)</div>
        
        <div id="top-right-menu">
            <!-- Save/Load Menu -->
            <div class="dropdown">
                <button class="dropbtn">💾 Game</button>
                <div class="dropdown-content">
                    <a onclick="saveGame()">Save As...</a>
                    <a onclick="loadGame()">Load Game...</a>
                </div>
            </div>

            <!-- Small Calendar Display -->
            <div id="date-display" onclick="openCalendar(event)">Loading date...</div>
            
            <!-- Next Button -->
            <button id="action-btn" class="btn-next" onclick="advanceTime()">Далее ➔</button>
        </div>
    </div>
</div>

<div id="modal-overlay"></div>
<div id="calendar-modal">
    <span class="close-modal" onclick="hideModal()">X</span>
    <h3>Upcoming Schedule</h3>
    <div id="upcoming-dates" style="margin-top: 15px; font-size: 0.9rem; color: #ccc;">
        No upcoming events scheduled.
    </div>
</div>

    <script>
        let activePageId = 'my_page';
        
        // Initialize page on load
        window.onload = () => {
            renderPage();
            updateUI();
        };

        async function updateUI() {
            const res = await fetch('/api/game/state');
            const data = await res.json();
            document.getElementById('date-display').innerText = data.currentDate;
        }

        function switchPage(pageId, params = {}) {
            activePageId = pageId;
            
            // Update sidebar visual state
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                if (el.innerText === 'Моя страница' && pageId === 'my_page') el.classList.add('active');
                if (el.innerText === 'Турниры' && pageId === 'tournaments') el.classList.add('active');
            });

            renderPage(params);
        }

        async function renderPage(params = {}) {
            const viewport = document.getElementById('main-viewport');
            const actionBtn = document.getElementById('action-btn');

            if (activePageId === 'my_page') {
                viewport.innerHTML = "<h1 style='color: white;'>Моя страница</h1><p style='color: #ccc;'>Ваш общий дашборд</p>";
                actionBtn.innerText = "Далее ➔";
                actionBtn.onclick = advanceTime;
                actionBtn.style.display = 'block';
            } else if (activePageId === 'tournaments') {
                viewport.innerHTML = "<h1 style='color: white;'>Турниры</h1><div id='tournaments-list'>Загрузка...</div>";
                actionBtn.style.display = 'none';
                loadTournaments();
            } else if (activePageId === 'league') {
                const leagueId = params.id;
                viewport.innerHTML = `<h1 style='color: white;'>Лига: ${leagueId}</h1><div class="tabs"><button class="tab-btn active" onclick="switchLeagueTab('table', '${leagueId}')">Таблица</button><button class="tab-btn" onclick="switchLeagueTab('results', '${leagueId}')">Результаты</button></div><div id='league-content'>Загрузка...</div>`;
                actionBtn.style.display, 'none'; // Fix: missing =
                actionBtn.style.display = 'none';
                switchLeagueTab('table', leagueId);
            } else if (activePageId === 'match') {
                const matchId = params.id;
                viewport.innerHTML = `<h1 style='color: white;'>Матч #${matchId}</h1><div id='match-details'>Загрузка...</div>`;
                actionBtn.style.display = 'none';
                loadMatchDetails(matchId);
            } else {
                viewport.innerHTML = "<h1 style='color: white;'>Страница не найдена</h1>";
                actionBtn.style.display = 'none';
            }
        }

        async function loadTournaments() {
            const res = await fetch('/api/game/tournaments');
            const data = await res.json();
            let html = "<div style='text-align: left; max-width: 800px; margin: 0 auto;'>";
            data.forEach(l => {
                html += `<div style='background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px;'>`;
                html += `<h2 style='color: #4CAF50; margin-top: 0;'>${l.name}</h2>`;
                html += `<table class="game-table"><thead><tr><th>Команда</th><th>Очки</th></tr></thead><tbody>`;
                l.topStandings.forEach(s => {
                    html += `<tr><td>${s.teamId}</td><td>${s.points}</td></tr>`;
                });
                html += `</tbody></table>`;
                html += `<div style='text-align: right;'><span class="link-text" onclick="switchPage('league', {id: '${l.id}'})">Открыть лигу ➔</span></div>`;
                html += `</div>`;
            });
            html += "</div>";
            document.getElementById('tournaments-list').innerHTML = html;
        }

        async function switchLeagueTab(tab, leagueId) {
            const content = document.getElementById('league-content');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs[0].classList.toggle('active', tab === 'table');
            tabs[1].classList.toggle('active', tab === 'results');

            if (tab === 'table') {
                content.innerHTML = "Загрузка таблицы...";
                const res = await fetch(`/api/game/leagues/${leagueId}`);
                const data = await res.json();
                let html = `<table class="game-table"><thead><tr><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>ГЗ-ГП</th><th>Очки</th></tr></thead><tbody>`;
                data.standings.forEach(s => {
                    html += `<tr><td>${s.teamId}</td><td>${s.played}</td><td>${s.won}</td><td>${s.drawn}</td><td>${s.lost}</td><td>${s.gf}-${s.ga}</td><td><b>${s.points}</b></td></tr>`;
                });
                html += `</tbody></table>`;
                content.innerHTML = html;
            } else {
                content.innerHTML = "Загрузка результатов...";
                const res = await fetch(`/api/game/leagues/${leagueId}/matches`);
                const data = await res.json();
                let html = "";
                for (const [round, matches] of Object.entries(data)) {
                    html += `<div class="round-section"><div class="round-title">Тур ${round}</div>`;
                    matches.forEach(m => {
                        const sA = m.result ? m.result.scoreA : '-';
                        const sB = m.result ? m.result.scoreB : '-';
                        html += `<div class="match-row" onclick="switchPage('match', {id: '${m.id}'})">
                            <div class="match-teams"><span>${m.teamA}</span> <div class="score-box">${sA}:${sB}</div> <span>${m.teamB}</span></div>
                            <div style='font-size: 0.7rem; color: #888;'>${m.date}</div>
                        </div>`;
                    });
                    html += `</div>`;
                }
                content.innerHTML = html;
            }
        }

        async function loadMatchDetails(matchId) {
            const res = await fetch(`/api/game/matches/${matchId}`);
            const data = await res.json();
            if (data.error) {
                document.getElementById('match-details').innerHTML = data.error;
                return;
            }
            const sA = data.result ? data.result.scoreA : 'Не сыграно';
            const sB = data.result ? data.result.scoreB : 'Не сыграно';
            document.getElementById('match-details').innerHTML = `
                <div style='background: #333; padding: 20px; border-radius: 10px; display: inline-block;'>
                    <div style='font-size: 1.2rem; margin-bottom: 10px;'>${data.teamA} vs ${data.teamB}</div>
                    <div style='font-size: 2.5rem; font-weight: bold; color: #4CAF50;'>${sA} : ${sB}</div>
                    <div style='color: #aaa; margin-top: 10px;'>Дата: ${data.date}</div>
                </div>`;
        }

        async function advanceTime() {
            await fetch('/api/game/next', { method: 'POST' });
            updateUI();
        }

    async function saveGame() {
        const name = prompt("Enter save name:");
        if (!name) return;
        const res = await fetch('/api/game/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ saveName: name })
        });
        alert(await res.text());
    }

    async function loadGame() {
        const name = prompt("Enter save name to load:");
        if (!name) return;
        const res = await fetch('/api/game/load', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ saveName: name })
        });
        alert(await res.text());
        updateUI();
    }

    function openCalendar(event) {
        event.stopPropagation();
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('calendar-modal').style.display = 'block';
        populateUpcomingDates();
    }

    function hideModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('calendar-modal').style.display = 'none';
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modal-overlay')) {
            hideModal();
        }
    }

    async function populateUpcomingDates() {
        const res = await fetch('/api/game/state');
        const data = await res.json();
        const current = new Date(data.currentDate);
        let html = "<ul>";
        for (let i = 1; i <= 5; i++) {
            let next = new Date(current);
            next.setDate(current.getDate() + (i * 7)); // Placeholder: show next few Mondays/weeks
            html += `<li>${next.toISOString().split('T')[0]} - Pending Match...</li>`;
        }
        html += "</ul>";
        document.getElementById('upcoming-dates').innerHTML = html;
    }

    updateUI();
</script>
</body>
</html>
